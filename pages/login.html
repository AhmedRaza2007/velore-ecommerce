<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - VELORÉ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .font-display { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="antialiased">
    <div class="bg-neutral-900 text-white text-center py-2 text-sm">
        <p>Free shipping on orders over $200</p>
    </div>
    
    <header class="sticky top-0 z-50 bg-white border-b border-gray-100">
        <div class="container mx-auto px-6">
            <div class="flex items-center justify-center h-20">
                <a href="../index.html" class="text-3xl font-display font-bold tracking-wider">VELORÉ</a>
            </div>
        </div>
    </header>

    <main class="py-16">
        <div class="container mx-auto px-6 max-w-md">
            <h1 class="text-3xl font-display font-bold text-center mb-8">Login</h1>
            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="block text-sm mb-1">Email</label>
                    <input type="email" required class="w-full border border-gray-200 px-4 py-3">
                </div>
                <div>
                    <label class="block text-sm mb-1">Password</label>
                    <input type="password" required class="w-full border border-gray-200 px-4 py-3">
                </div>
                <button type="submit" class="w-full bg-black text-white py-4 uppercase tracking-wider hover:bg-gray-800">Login</button>
            </form>
            <p class="text-center mt-6 text-gray-600">
                Don't have an account? <a href="register.html" class="text-black border-b border-gray-300 hover:border-black">Register</a>
            </p>
        </div>
    </main>

    <footer class="bg-white border-t border-gray-200">
        <div class="container mx-auto px-6 py-8">
            <p class="text-sm text-gray-500 text-center">&copy; 2024 VELORÉ. All rights reserved.</p>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            lucide.createIcons();
            document.getElementById('loginForm').addEventListener('submit', function(e) {
                e.preventDefault();
                alert('Login successful!');
                window.location.href = '../index.html';
            });
        });
    </script>
</body>
</html>
